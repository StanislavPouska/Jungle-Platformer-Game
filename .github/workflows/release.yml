name: Create GitHub Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow on production tags (e.g., v1.0.0, v2.1.0-beta)

permissions:
  contents: write # Required for creating releases and uploading assets

jobs:
  build-and-release:
    name: Build & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for all tags and branches (useful for auto changelog generation)

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Diagnostics / TypeScript Lint
        run: npm run lint

      - name: Build Production Assets
        run: npm run build

      - name: Prepare Release Assets
        run: |
          # Compress the compiled dist/ directory ready for static hosting
          cd dist
          zip -r ../jungle-platformer-game-build.zip .
          cd ..
          
          # Optional: package the source files (excluding node_modules) if users want reference code
          zip -r jungle-platformer-game-source.zip . -x "node_modules/*" ".git/*" "dist/*"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jungle-platformer-game-build.zip
            jungle-platformer-game-source.zip
          name: Release ${{ github.ref_name }}
          body: |
            ## Jungle Platformer Game - Release ${{ github.ref_name }}
            
            Welcome to the official release of **Jungle Platformer Game** `${{ github.ref_name }}`!
            
            ### Deployment & Packages
            - **Build Asset (`jungle-platformer-game-build.zip`)**: Ready-to-go client-side bundle. Extract these files on static web servers, Netlify, Vercel, or AWS S3 to run the game immediately.
            - **Source Code Core (`jungle-platformer-game-source.zip`)**: Full project workspace bundle excluding heavy temporary cache folders.
            
            ---
            *Automatically generated by the Release Automation workflow pipeline.*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
