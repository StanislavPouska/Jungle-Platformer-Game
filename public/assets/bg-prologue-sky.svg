<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="psky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070403"/>
      <stop offset="0.34" stop-color="#1a0a07"/>
      <stop offset="0.60" stop-color="#34120a"/>
      <stop offset="0.82" stop-color="#6e2810"/>
      <stop offset="1" stop-color="#9a3a14"/>
    </linearGradient>
    <radialGradient id="fireGlow" cx="0.5" cy="1" r="0.9">
      <stop offset="0" stop-color="#ff9b3d" stop-opacity="0.5"/>
      <stop offset="0.4" stop-color="#e2541a" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#e2541a" stop-opacity="0"/>
    </radialGradient>
    <filter id="smoke" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.005 0.011" numOctaves="4" seed="23" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.14  0 0 0 0 0.10  0 0 0 0 0.08  0 0 0 0.6 -0.28"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#psky)"/>
  <!-- drifting smoke -->
  <rect width="1280" height="560" filter="url(#smoke)" opacity="0.7"/>
  <!-- warm fire glow rising from the burning village below the horizon -->
  <rect width="1280" height="720" fill="url(#fireGlow)"/>
  <!-- faint blood moon -->
  <circle cx="250" cy="120" r="34" fill="#c75a2a" opacity="0.55"/>
  <circle cx="250" cy="120" r="90" fill="#c75a2a" opacity="0.12"/>
</svg>
